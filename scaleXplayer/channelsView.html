<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>YouTube Channel Viewer</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        input,
        button {
            padding: 10px;
            font-size: 16px;
        }

        #videos {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        .video {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        .video img {
            width: 100%;
            border-radius: 5px;
        }

        .title {
            font-size: 14px;
            margin-top: 8px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);

            /* 置中 */
            /* display: flex; */
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            position: relative;
            width: 80%;
            max-width: 900px;
            aspect-ratio: 16 / 9;
            background: black;
            border-radius: 10px;
            overflow: hidden;
        }

        .modal iframe {
            width: 100%;
            height: 100%;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;

            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            font-size: 18px;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
        }
    </style>
</head>

<body>

    <h2>YouTube Channel Viewer</h2>

    <div id="playerModal" class="modal">
        <div class="modal-content">

            <button class="close-btn" onclick="closePlayer()">✕</button>

            <iframe id="player" src="" frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>

        </div>
    </div>

    <div id="channelButtons" style="margin-bottom:15px;"></div>
    <div id="videos"></div>

    <script>
        let channels = [
            {
                "name": "粵愛車",
                "channelId": "ECgLoeDDSdixhDhIvrDuqw"
            },
            {
                "name": "胖虎Yvette",
                "channelId": "J3TcURIB6rTBWDMx6wBJVA"
            }
        ]

        function renderChannelButtons() {
            const container = document.getElementById("channelButtons");
            container.innerHTML = "";

            channels.forEach(channel => {
                const btn = document.createElement("button");

                btn.textContent = channel.name;
                btn.style.marginRight = "10px";
                btn.style.padding = "8px 12px";
                btn.style.cursor = "pointer";

                btn.onclick = () => {
                    loadVideos(channel.channelId);
                    highlightActiveButton(btn);
                };

                container.appendChild(btn);
            });
        }

        async function loadVideos(channelId) {
            const container = document.getElementById("videos");
            container.innerHTML = "Loading...";

            if (!channelId) {
                container.innerHTML = "Missing channelId";
                return;
            }

            try {
                const rssUrl = `https://www.youtube.com/feeds/videos.xml?playlist_id=UULF${channelId}`;
                const proxy = `https://crimson-shape-c360.garywu-jiawen.workers.dev/?url=${encodeURIComponent(rssUrl)}`;

                const response = await fetch(proxy);
                const text = await response.text();

                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");
                const entries = xml.getElementsByTagName("entry");

                container.innerHTML = "";

                for (let entry of entries) {
                    const title = entry.getElementsByTagName("title")[0].textContent;
                    const videoId = entry.getElementsByTagName("yt:videoId")[0].textContent;
                    const thumbnail = `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

                    const div = document.createElement("div");
                    div.className = "video";

                    div.innerHTML = `
        <a href="#" onclick="playVideo('${videoId}'); return false;">
          <img src="${thumbnail}" />
        </a>
        <div class="title">${title}</div>
      `;

                    container.appendChild(div);
                }

            } catch (err) {
                container.innerHTML = "Error loading videos.";
                console.error(err);
            }
        }

        function playVideo(videoId) {
            const player = document.getElementById("player");
            const modal = document.getElementById("playerModal");

            const origin = window.location.origin;

            const newSrc = `https://www.youtube.com/embed/${videoId}?autoplay=1&origin=${origin}`;

            if (player.src !== newSrc) {
                player.src = newSrc;
            }

            modal.style.display = "flex";
        }

        function closePlayer() {
            const modal = document.getElementById("playerModal");
            const player = document.getElementById("player");

            modal.style.display = "none";
            player.src = ""; // 停止播放
        }

        renderChannelButtons();
    </script>

</body>

</html>
